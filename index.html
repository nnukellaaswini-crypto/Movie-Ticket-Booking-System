<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movie Ticket Payment</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:450px;
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
    color:#333;
    margin-bottom:20px;
}

.input-group{
    margin-bottom:15px;
}

label{
    display:block;
    margin-bottom:5px;
    font-weight:bold;
}

input, select{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:5px;
}

.ticket-info{
    background:#eef5ff;
    padding:15px;
    border-radius:5px;
    margin-bottom:15px;
}

.ticket-info p{
    margin:8px 0;
}

.btn{
    width:100%;
    padding:12px;
    background:#28a745;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
}

.btn:hover{
    background:#218838;
}

.success{
    display:none;
    text-align:center;
    margin-top:20px;
    padding:15px;
    background:#d4edda;
    color:#155724;
    border-radius:5px;
}
</style>

</head>
<body>

<div class="container">

<h2>Movie Ticket Payment</h2>

<div class="ticket-info">
    <p><strong>Movie:</strong> Pushpa 2</p>
    <p><strong>Seats:</strong> 3</p>
    <p><strong>Price per Ticket:</strong> ₹150</p>
    <p><strong>Total Amount:</strong> ₹450</p>
</div>

<form id="paymentForm">

<div class="input-group">
    <label>Card Holder Name</label>
    <input type="text" id="name" required>
</div>

<div class="input-group">
    <label>Card Number</label>
    <input type="text" id="card" maxlength="16" placeholder="1234567812345678" required>
</div>

<div class="input-group">
    <label>Expiry Date</label>
    <input type="month" required>
</div>

<div class="input-group">
    <label>CVV</label>
    <input type="password" maxlength="3" required>
</div>

<div class="input-group">
    <label>Payment Method</label>
    <select required>
        <option value="">Select Method</option>
        <option>Credit Card</option>
        <option>Debit Card</option>
        <option>UPI</option>
        <option>Net Banking</option>
    </select>
</div>

<button type="submit" class="btn">
    Pay ₹450
</button>

</form>

<div class="success" id="successMessage">
    <h3>✅ Payment Successful!</h3>
    <p>Your Movie Ticket has been Booked.</p>
    <p>Booking ID: <span id="bookingId"></span></p>
</div>

</div>

<script>

document.getElementById("paymentForm").addEventListener("submit", function(e){

    e.preventDefault();

    let bookingID = "MOV" + Math.floor(Math.random()*100000);

    document.getElementById("bookingId").innerText = bookingID;

    document.getElementById("successMessage").style.display="block";

    document.getElementById("paymentForm").reset();
});

</script>

</body>
</html>
